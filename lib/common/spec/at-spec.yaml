defs:
  schema: &schema
    $schema:
      type: string
    x-scope-name:
      type: string
    title:
      type: string
    description:
      type: string
    type:
      const: array
      type: string
    items:
      type: object

  condition: &condition
    $schema:
      type: string
    x-scope-name:
      type: string
    title:
      type: string
    description:
      type: string
    type:
      const: object
      type: string
    additionalProperties:
      const: false
      type: boolean
    properties:
      type: object
    $defs:
      type: object

  scope: &scope
    description: List of app scopes
    type: array
    items:
      type: object
      required: [name, schema, condition]
      additionalProperties: false
      properties:
        name:
          description: Scope name
          type: string
        method:
          description: Supported HTTP methods
          type: array
          items:
            type: string
            enum: [GET, POST, PUT, DELETE]

        schema:
          description: Request and response schema in JSON Schema format
          type: object
          properties: *schema

        condition:
          description: Query condition schema in JSON Schema format
          type: object
          properties: *condition


scope:
- name: '@spec'
  method: [GET]
  schema:
    title: '@spec'
    description: Provides a list of available scopes, schemas, and query conditions.
    type: array
    items:
      type: object
      required: [description, scope]
      additionalProperties: false
      properties:

        description:
          description: App description
          type: string
          readOnly: true
        scope: *scope

- name: '@schema'
  method: [GET]
  schema:
    title: '@schema'
    description: Request and response schema in JSON Schema format
    type: array
    items:
      type: object
      properties: *schema

- name: '@condition'
  method: [GET]
  schema:
    title: '@condition'
    description: Query condition schema in JSON Schema format
    type: array
    items:
      type: object
      additionalProperties: false
      properties: *condition

